[package]
name = "vnt-core"
version = "2.0.0"
edition = "2024"

[dependencies]


tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
futures = "0.3"

tun-rs = { version = "2", features = ["async", "async_framed"] }

rust-p2p-core = { version="0.4" }
tcp_ip = { git = "https://github.com/rustp2p/tcp_ip" }

anyhow = "1"
parking_lot = "0.12"

quinn = { version = "0.11", default-features = false, features = ["rustls", "runtime-tokio"] }

tokio-rustls = { version = "0.26", default-features = false, features = ["ring"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
hex = "0.4"
sha2 = "0.10"
rustls-native-certs = "0.8.2"
log = "0.4"
bytes = "1.11.0"
rand = "0.9"
time = { version = "0.3", features = ["macros", "formatting", "local-offset"] }
pnet_packet = "0.35"
ring = "0.17.14"

prost = "0.14"
tokio-tungstenite = "0.28.0"
tungstenite = "0.28.0"
uuid = { version = "1.18.1", features = ["v4"] }
ipnet = { version = "2.11", features = ["serde"] }
getifaddrs = "0.6.0"
dns-parser = "0.8"

lz4_flex = "0.12.0"
reed-solomon-erasure = "6.0"

serde = { version = "1.0.228", features = ["derive"] }
rcgen = "0.14.6"

zerocopy = { version = "0.8.31", features = ["derive"] }
socket2 = { version = "0.6.1", features = ["all"] }

[target.'cfg(target_os = "windows")'.dependencies]
winapi = { version = "0.3.9", features = ["winreg"] }
widestring = "1.2"

[build-dependencies]
prost-build = "0.14"
protoc-bin-vendored = "3.0.0"

[target.x86_64-pc-windows-msvc.build-dependencies]
thunk-rs = { version = "0.3.3", features = ["win7"] }

[target.i686-pc-windows-msvc.build-dependencies]
thunk-rs = { version = "0.3.3", features = ["win7"] }
